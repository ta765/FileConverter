<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>File Converter</title>
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
    }

    button {
      padding: 10px 14px;
      font-size: 16px;
      cursor: pointer;
    }

    .muted {
      color: #666;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h1>File Converter</h1>

  <section class="card">
    <h2>File Converter</h2>

    <label for="fileInput">Upload a file</label><br />
    <input id="fileInput" type="file" accept=".txt,text/plain,.xml" />

    <div style="margin-top: 12px;">
        <button id="btnFormat" disabled>Format</button>
        <button id="btnDownload" disabled>Download Formatted File</button>
    </div>

    <p id="formatStatus" style="margin-top: 12px;"></p>

    <h3>Output</h3>
    <textarea id="output" rows="10" style="width: 100%;" readonly></textarea>
</section>

  <script src="app.js"></script>
</body>
</html>
