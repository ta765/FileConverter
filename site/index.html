<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>File Converter</title>
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
    }

    button {
      padding: 10px 14px;
      font-size: 16px;
      cursor: pointer;
    }

    .muted {
      color: #666;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h1>File Converter</h1>

  <section class="card">
    <h2>File Converter</h2>

    <p class="muted">
        Upload a file you wish to convert then click "Convert".
    </p>

    <label for="fileInput">Upload a .xml or .json file</label><br />
    <input id="fileInput" type="file" accept=".xml,.json" />

    <button id="btnFormat" disabled style="margin-top: 12px;">Convert</button>

    <p id="formatStatus" style="margin-top: 12px;"></p>

    <h3>Preview</h3>
    <textarea id="output" rows="10" style="width: 100%;" readonly></textarea>

    <button id="btnDownload" disabled style="margin-top: 12px;">Download</button>
</section>

  <script src="app.js"></script>
</body>
</html>
